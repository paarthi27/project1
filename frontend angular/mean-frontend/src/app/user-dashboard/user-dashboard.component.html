<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

  <a class="navbar-brand fw-bold" href="#">
    MPloyChek User
  </a>

  <div class="ms-auto">

    <button
      class="btn btn-danger"
      (click)="logout()">

      Logout

    </button>

  </div>

</nav>



<!-- MAIN CONTAINER -->

<div class="container mt-5">



  <!-- WELCOME CARD -->

  <div class="card shadow p-4 mb-4">

    <h2 class="fw-bold">
      Welcome {{user.username}}
    </h2>

    <p class="text-muted mb-0">

      Role :
      <span class="badge bg-primary ">

        {{user.role}}

      </span>

    </p>

  </div>



  <!-- VIEW RECORD BUTTON -->

  <div class="mb-4">

    <button
      class="btn btn-dark"
      (click)="viewRecords()">

      View Records

    </button>

  </div>



  <!-- LOADING -->

  <div
    class="text-center mt-5"
    *ngIf="loading">

    <div class="spinner-border text-primary">

    </div>

    <p class="mt-3">
      Loading Records...
    </p>

  </div>



  <!-- RECORD TABLE -->

  <div
    class="card shadow p-3"
    *ngIf="showTable && !loading">

    <table class="table table-hover align-middle">

      <thead class="table-dark">

        <tr>

          <th>Record ID</th>
          <th>Record Name</th>
          <th>Access</th>

        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let rec of records">

          <td>
            {{rec.recordId}}
          </td>

          <td>
            {{rec.recordName}}
          </td>

          <td>

            <span class="badge bg-success">

              {{rec.access}}

            </span>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
