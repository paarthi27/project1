<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

  <a class="navbar-brand fw-bold" href="#">
    MPloyChek Admin
  </a>

  <div class="ms-auto">

    <button class="btn btn-danger" (click)="logout()">
      Logout
    </button>

  </div>

</nav>



<!-- MAIN CONTAINER -->

<div class="container mt-5">



  <!-- TOP SECTION -->

  <div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="fw-bold">
      Admin Dashboard
    </h2>
<div>
    <button
      class="btn btn-primary"
      (click)="showForm = !showForm">

      {{ showForm ? 'Close Form' : 'Add User' }}

    </button>

    <button
class="btn btn-dark m-2"
(click)="getdata()">

View Users

</button>
</div>

  </div>



  <!-- ADD USER FORM -->

  <div
    class="card shadow p-4 mb-4"
    *ngIf="showForm">

    <h4 class="mb-3">
      Create New User
    </h4>

    <div class="row">

      <div class="col-md-4 mb-3">

        <input
          type="text"
          class="form-control"
          placeholder="Username"
          [(ngModel)]="newUser.username">

      </div>


      <div class="col-md-4 mb-3">

        <input
          type="password"
          class="form-control"
          placeholder="Password"
          [(ngModel)]="newUser.password">

      </div>


      <div class="col-md-4 mb-3">

        <select
          class="form-select"
          [(ngModel)]="newUser.role">

          <option value="">
            Select Role
          </option>

          <option value="Admin">
            Admin
          </option>

          <option value="General User">
            General User
          </option>

        </select>

      </div>

    </div>


    <button
      class="btn btn-success"
      (click)="create()">

      Create User

    </button>

  </div>



  <!-- LOADING -->

  <div
    class="text-center mt-5"
    *ngIf="loading">

    <div class="spinner-border text-primary">

    </div>

    <p class="mt-3">
      Loading Users...
    </p>

  </div>



  <!-- USERS TABLE -->

  <div
    class="card shadow p-3 mt-4"
    *ngIf="showTable &&!loading">

    <table class="table table-hover align-middle">

      <thead class="table-dark">

        <tr>

          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let user of users">

          <td>
            {{user.id}}
          </td>

          <td>
            {{user.username}}
          </td>

          <td>

            <span
              class="badge bg-primary"
              *ngIf="user.role == 'Admin'">

              Admin

            </span>

            <span
              class="badge bg-secondary"
              *ngIf="user.role == 'General User'">

              General User

            </span>

          </td>

          <td>

            <button
              class="btn btn-danger btn-sm"
              (click)="delete(user.id)">

              Delete

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
